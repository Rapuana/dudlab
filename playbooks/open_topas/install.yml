    - name: Ensure shellScripts directory is in PATH
      become_user: "{{ opentopas_user }}"
      lineinfile:
        path: "/home/{{ opentopas_user }}/.bashrc"
        line: 'export PATH=~/shellScripts:$PATH'
        state: present

    - name: Create shellScripts directory
      become_user: "{{ opentopas_user }}"
      file:
        path: "/home/{{ opentopas_user }}/shellScripts"
        state: directory
        mode: '0755'