---
- name: Deploy Pi-hole DNS ad-blocker
  hosts: k3s_master_node
  become: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Add mojo2600 Pi-hole Helm repo
      command: helm repo add mojo2600 https://mojo2600.github.io/pihole-kubernetes/
      changed_when: false

    - name: Update Helm repos
      command: helm repo update
      changed_when: false

    - name: Create pihole namespace
      command: kubectl create namespace pihole --dry-run=client -o yaml
      register: pihole_ns
      changed_when: false

    - name: Apply pihole namespace
      command: kubectl apply -f -
      args:
        stdin: "{{ pihole_ns.stdout }}"
      changed_when: false

    - name: Install Pi-hole via Helm
      command:
        cmd: >
          helm upgrade --install pihole mojo2600/pihole
          --namespace pihole
          --set serviceWeb.type=LoadBalancer
          --set serviceWeb.loadBalancerIP={{ pihole_ip }}
          --set "serviceWeb.annotations.metallb\.universe\.tf/allow-shared-ip=pihole"
          --set serviceDns.type=LoadBalancer
          --set serviceDns.loadBalancerIP={{ pihole_ip }}
          --set "serviceDns.annotations.metallb\.universe\.tf/allow-shared-ip=pihole"
          --set adminPassword={{ pihole_password }}
          --set persistentVolumeClaim.enabled=true
          --set persistentVolumeClaim.storageClass=longhorn
          --wait --timeout 5m
      changed_when: false

    - name: Wait for Pi-hole to be ready
      command: >
        kubectl wait deployment pihole
        --namespace pihole
        --for=condition=Available
        --timeout=180s
      changed_when: false

    - name: Display Pi-hole access info
      debug:
        msg:
          - "Pi-hole deployed."
          - "Admin UI: http://{{ pihole_ip }}/admin"
          - "DNS server IP: {{ pihole_ip }}"
          - "Admin password: (see vault.yml)"
          - "Point your router's DNS to {{ pihole_ip }} to enable network-wide ad blocking."
          - "Change the password after first login."
