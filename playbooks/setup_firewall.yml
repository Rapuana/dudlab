---
- name: Configure firewall on dudlab cluster
  hosts: dudlab_cluster
  become: true
  tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Allow SSH connections
      community.general.ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow Kubernetes API server access on port 6443/tcp
      community.general.ufw:
        rule: allow
        port: 6443
        proto: tcp

    - name: Allow kubelet API (node communication)
      community.general.ufw:
        rule: allow
        port: 10250
        proto: tcp

    - name: Allow Flannel VXLAN overlay network
      community.general.ufw:
        rule: allow
        port: 8472
        proto: udp

    - name: Allow MetalLB L2 memberlist sync
      community.general.ufw:
        rule: allow
        port: 7946
        proto: any

    - name: Allow NodePort service range
      community.general.ufw:
        rule: allow
        port: 30000:32767
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Check UFW status
      become: true
      ansible.builtin.command: ufw status numbered
      register: ufw_status_output
      changed_when: false

    - name: Display UFW status
      ansible.builtin.debug:
        var: ufw_status_output.stdout
