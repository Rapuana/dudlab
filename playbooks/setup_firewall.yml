---
- name: Configure firewall on dudlab cluster
  hosts: dudlab_cluster
  become: yes
  tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Allow SSH connections
      ansible.builtin.ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow Kubernetes API server access on port 6443/tcp
      ansible.builtin.ufw:
        rule: allow
        port: 6443
        proto: tcp

    - name: Allow kubelet API (node communication)
      ansible.builtin.ufw:
        rule: allow
        port: 10250
        proto: tcp

    - name: Allow Flannel VXLAN overlay network
      ansible.builtin.ufw:
        rule: allow
        port: 8472
        proto: udp

    - name: Allow MetalLB L2 memberlist sync
      ansible.builtin.ufw:
        rule: allow
        port: 7946
        proto: any

    - name: Allow NodePort service range
      ansible.builtin.ufw:
        rule: allow
        port: 30000:32767
        proto: tcp

    - name: Enable UFW
      ansible.builtin.ufw:
        state: enabled

    - name: Check UFW status
      become: yes
      command: ufw status numbered
      register: ufw_status_output

    - name: Display UFW status
      debug:
        var: ufw_status_output.stdout