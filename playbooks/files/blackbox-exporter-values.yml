---
# Helm values for prometheus-community/prometheus-blackbox-exporter
# Probes: ICMP ping to DNS resolvers + HTTP checks to public sites

config:
  modules:
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: ip4
    http_2xx:
      prober: http
      timeout: 10s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: []  # defaults to 2xx
        method: GET
        preferred_ip_protocol: ip4
        follow_redirects: true

serviceMonitor:
  enabled: true
  interval: 60s
  scrapeTimeout: 30s
  # These targets become individual Prometheus scrape jobs via the ServiceMonitor.
  # Each target is probed at the above interval.
  targets:
    - name: cloudflare-dns
      url: 1.1.1.1
      module: icmp
    - name: google-dns
      url: 8.8.8.8
      module: icmp
    - name: google
      url: https://www.google.com
      module: http_2xx
    - name: cloudflare
      url: https://1.1.1.1
      module: http_2xx
