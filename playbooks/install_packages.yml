---
- name: Install common packages on dudlab cluster
  hosts: dudlab_cluster
  become: true
  tasks:
    - name: Install utilities
      ansible.builtin.apt:
        name:
          - curl
          - vim
          - htop
          - git
          - avahi-daemon
          - net-tools
          - ufw
          # Required by Longhorn for persistent storage
          - open-iscsi
          - nfs-common
        state: present
        update_cache: true

    - name: Enable and start iscsid (required by Longhorn)
      ansible.builtin.systemd:
        name: iscsid
        state: started
        enabled: true

    - name: Ensure /etc/resolv.conf is a static file with a reliable nameserver
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: "nameserver 8.8.8.8\n"
        owner: root
        group: root
        mode: '0644'
        force: true
