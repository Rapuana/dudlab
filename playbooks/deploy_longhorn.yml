---
- name: Deploy Longhorn persistent storage
  hosts: k3s_master_node
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Check if Helm is installed
      ansible.builtin.command: which helm
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/install-helm.sh
        mode: '0755'
      when: helm_check.rc != 0

    - name: Install Helm
      ansible.builtin.command: /tmp/install-helm.sh
      environment:
        DESIRED_VERSION: "{{ helm_version }}"
      when: helm_check.rc != 0
      changed_when: helm_check.rc != 0

    - name: Add Longhorn Helm repo
      ansible.builtin.command: helm repo add longhorn https://charts.longhorn.io
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Create Longhorn namespace
      ansible.builtin.command: kubectl create namespace longhorn-system --dry-run=client -o yaml
      register: longhorn_ns
      changed_when: false

    - name: Apply Longhorn namespace
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: "{{ longhorn_ns.stdout }}"
      changed_when: false

    - name: Install Longhorn via Helm
      ansible.builtin.command: >
        helm upgrade --install longhorn longhorn/longhorn
        --namespace longhorn-system
        --version {{ longhorn_chart_version }}
        --set defaultSettings.defaultReplicaCount=2
        --wait --timeout 10m
      changed_when: false

    - name: Create Longhorn UI LoadBalancer service
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: v1
          kind: Service
          metadata:
            name: longhorn-ui-lb
            namespace: longhorn-system
          spec:
            type: LoadBalancer
            loadBalancerIP: {{ longhorn_ip }}
            selector:
              app: longhorn-ui
            ports:
              - name: http
                port: 80
                targetPort: http
      changed_when: false

    - name: Wait for Longhorn to be ready
      ansible.builtin.command: >
        kubectl wait deployment longhorn-ui
        --namespace longhorn-system
        --for=condition=Available
        --timeout=300s
      changed_when: false

    - name: Set Longhorn as default StorageClass
      ansible.builtin.command: >
        kubectl patch storageclass local-path
        -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
      failed_when: false
      changed_when: false

    - name: Confirm Longhorn is default StorageClass
      ansible.builtin.command: kubectl get storageclass
      register: sc_status
      changed_when: false

    - name: Display StorageClass status
      ansible.builtin.debug:
        msg:
          - "Longhorn deployed. Storage classes:"
          - "{{ sc_status.stdout_lines }}"
          - "Longhorn UI available at http://{{ longhorn_ip }}"
