---
- name: Deploy Portainer CE web UI
  hosts: k3s_master_node
  become: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Add Portainer Helm repo
      command: helm repo add portainer https://portainer.github.io/k8s/
      changed_when: false

    - name: Update Helm repos
      command: helm repo update
      changed_when: false

    - name: Create Portainer namespace
      command: kubectl create namespace portainer --dry-run=client -o yaml
      register: portainer_ns
      changed_when: false

    - name: Apply Portainer namespace
      command: kubectl apply -f -
      args:
        stdin: "{{ portainer_ns.stdout }}"
      changed_when: false

    - name: Install Portainer CE via Helm
      command:
        cmd: >
          helm upgrade --install portainer portainer/portainer
          --namespace portainer
          --set service.type=LoadBalancer
          --set service.loadBalancerIP={{ portainer_ip }}
          --wait --timeout 5m
      changed_when: false

    - name: Wait for Portainer to be ready
      command: >
        kubectl wait deployment portainer
        --namespace portainer
        --for=condition=Available
        --timeout=180s
      changed_when: false

    - name: Display Portainer access info
      debug:
        msg:
          - "Portainer deployed."
          - "URL: https://{{ portainer_ip }}:9443"
          - "Set your admin password on first login."
